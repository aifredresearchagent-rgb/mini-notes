<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101114" />
    <title>Todo Kacheln</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" aria-label="Todo Kacheln App">
      <header class="topbar">
        <div>
          <p class="eyebrow">localStorage</p>
          <h1>Todo Kacheln</h1>
        </div>
        <button id="add-todo" class="button" type="button">+ Neue Kachel</button>
      </header>

      <p class="hint">Tippe zum Bearbeiten. Ziehe Kacheln zum Sortieren.</p>

      <section id="todo-list" class="todo-list" aria-label="Todo Liste"></section>
    </main>

    <template id="todo-template">
      <article class="todo-card" draggable="true">
        <div class="card-top">
          <button class="done-button" type="button" aria-label="Erledigt umschalten"></button>
          <button class="delete-button" type="button" aria-label="Kachel löschen">×</button>
        </div>

        <input class="title-input" type="text" placeholder="Titel" aria-label="Todo Titel" />
        <textarea class="details-input" placeholder="Details hinzufügen ..." aria-label="Todo Details"></textarea>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
